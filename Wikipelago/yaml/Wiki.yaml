name: Skrumptily69Wiki
game: Wikipelago
description: Async-safe Wikipelago template

Wikipelago:
  # Recommended safe settings:
  # - check_count: 20-25 for shorter asyncs or 3-4 hour syncs
  # - required_fragments: 4-5 for gentler pacing
  # - start_rounds_unlocked: 10+ to reduce early BK risk
  # - rounds_per_unlock: 4-5 for steady progression
  #
  # Generation safety notes:
  # - Avoid very high check_count with narrow category pools
  # - If you enable Searchsanity or Scrollsanity, keep check_count modest
  # - If generation complains about not enough titles, lower check_count or enable more categories
  # - Random goal article is safer than forcing a preset in a disabled category
  progression_balancing: 50
  check_count: 50
  required_fragments: 20
  start_rounds_unlocked: 10
  rounds_per_unlock: 10
  random_goal_article: true
  goal_article_preset: dark_souls
  searchsanity: false
  scrollsanity: false
  search_starting_letters: none

  include_video_games: true
  include_board_games: true
  include_movies: true
  include_tv_shows: true
  include_anime_manga: false
  include_sports: true
  include_science_space: true
  include_technology: true
  include_history: true
  include_geography: true
  include_food_cuisine: true
  include_art_literature: true
  include_mythology_folklore: true
