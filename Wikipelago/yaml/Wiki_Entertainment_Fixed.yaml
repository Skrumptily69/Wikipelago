name: WikiTester
game: Wikipelago
description: Release template for Wikipelago

Wikipelago:
  # 0-99. Higher values usually bias progression a bit earlier.
  progression_balancing: 50

  # Number of generated round checks.
  check_count: 50

  # Knowledge Fragments needed to finish the Grand Goal.
  required_fragments: 8

  # How many rounds are available at the start.
  start_rounds_unlocked: 8

  # Each Round Access item unlocks this many more rounds.
  rounds_per_unlock: 5

  # If true, the final goal article is chosen randomly from enabled categories.
  random_goal_article: false

  # Used only when random_goal_article is false.
  # Valid values:
  # minecraft
  # the_legend_of_zelda
  # dark_souls
  # elden_ring
  # super_mario_bros
  # pokemon_red_and_blue
  # chess
  # catan
  # the_dark_knight
  # star_wars_film
  # lord_of_the_rings_fellowship
  # the_matrix
  # avatar_the_last_airbender
  # breaking_bad
  # stranger_things
  # game_of_thrones
  # the_simpsons
  # spongebob_squarepants
  # super_smash_bros_ultimate
  # halo_combat_evolved
  goal_article_preset: dark_souls

  # Category toggles.
  # Turn categories on/off to control what kinds of articles appear.
  include_video_games: true
  include_board_games: true
  include_movies: true
  include_tv_shows: true
  include_anime_manga: true
  include_sports: true
  include_science_space: true
  include_technology: true
  include_history: true
  include_geography: true
  include_food_cuisine: true
  include_art_literature: true
  include_mythology_folklore: true

